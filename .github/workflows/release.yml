name: UV CD (Publish)

on:
  release:
    types: [published]

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Build package
        run: uv build

      - name: Publish package to PyPI
        run: uv publish
